<svg xmlns="http://www.w3.org/2000/svg" width="220" height="52" viewBox="0 0 220 52">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bb3a3"/>
      <stop offset="100%" stop-color="#1e88a8"/>
    </linearGradient>
  </defs>

  <!-- Hexagon badge -->
  <polygon points="26,3 47,14.5 47,37.5 26,49 5,37.5 5,14.5" fill="url(#goldGrad)"/>

  <!-- 4-pointed sparkle star -->
  <path d="M26,13 L28.2,23.8 L39,26 L28.2,28.2 L26,39 L23.8,28.2 L13,26 L23.8,23.8 Z" fill="#0f4c5c"/>
  <!-- Small accent dots -->
  <circle cx="36" cy="15" r="2" fill="#0f4c5c"/>
  <circle cx="16" cy="15" r="1.3" fill="#0f4c5c"/>
  <circle cx="38" cy="36" r="1.3" fill="#0f4c5c"/>

  <!-- Divider line -->
  <line x1="60" y1="8" x2="60" y2="44" stroke="#2bb3a3" stroke-width="1" opacity="0.45"/>

  <!-- TOP text -->
  <text x="72" y="27" font-family="Montserrat, Georgia, sans-serif" font-size="21" font-weight="900" fill="url(#goldGrad)" letter-spacing="1">TOP</text>

  <!-- AFLEVERING text -->
  <text x="73" y="41" font-family="Montserrat, Georgia, sans-serif" font-size="10" font-weight="500" fill="#263238" letter-spacing="3.5">AFLEVERING</text>
</svg>
